name: Get available action data

on: 
  push:
    branches:
      - main

  schedule:
    - cron: 7 0 * * 1-5

  # run manually
  workflow_dispatch:
  
permissions:
  contents: read

jobs:
  get-action-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to write back the repository

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
      with:
        egress-policy: audit

    - uses: devops-actions/load-available-actions@b46a50119e29dd0930da799e49f36c7f33d98cb6 # v2.2.0
      name: Load available actions
      id: load-actions
      with: 
        PAT: ${{ secrets.PAT }}
        user: ${{ github.repository_owner }}
        fetchReadmes: true
        
    - name: Update filename
      id: filename
      run: |
        filename="actions-data.json"
        mv ${{ steps.load-actions.outputs.actions-file-path }} $filename
        echo "filename=$filename" >> $GITHUB_OUTPUT
    
    - name: Show action count in summary
      run: |
        actions_count=$(jq '.actions // [] | length' ${{ steps.filename.outputs.filename }})
        workflows_count=$(jq '.workflows // [] | length' ${{ steps.filename.outputs.filename }})
        total=$((actions_count + workflows_count))
        echo "## Action Data Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Actions found:** $actions_count" >> $GITHUB_STEP_SUMMARY
        echo "- **Reusable workflows found:** $workflows_count" >> $GITHUB_STEP_SUMMARY
        echo "- **Total:** $total" >> $GITHUB_STEP_SUMMARY
        
    - name: Upload result file as artefact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with: 
        name: actions
        path: ${{ steps.filename.outputs.filename }}
   
    - name: Upload json to this repository
      #uses: LasyIsLazy/github-upload-action@v0.1.0
      uses: rajbos-actions/github-upload-action@997e5c85d66375559f76e55008ab63cbee71542e # v0.2.0
      with:
        access-token: ${{ secrets.GITHUB_TOKEN }}
        file-path: ${{ steps.filename.outputs.filename }}
        owner: ${{ github.repository_owner }}
        repo: actions-marketplace # ${{ github.repository }} doesn't work with this action :-(, it'll fail over the slash and owner name
        #remote-dir:  // upload in the root
        branch-name: gh-pages

    - name: Update URL pointer with versioned filename
      run: |
        # Embed the run ID so the URL changes on every data update, busting the browser cache
        echo -n "actions-data.json?v=${{ github.run_id }}" > actions-data-url.txt

    - name: Upload versioned URL pointer to this repository
      uses: rajbos-actions/github-upload-action@997e5c85d66375559f76e55008ab63cbee71542e # v0.2.0
      with:
        access-token: ${{ secrets.GITHUB_TOKEN }}
        file-path: actions-data-url.txt
        owner: ${{ github.repository_owner }}
        repo: actions-marketplace
        branch-name: gh-pages
